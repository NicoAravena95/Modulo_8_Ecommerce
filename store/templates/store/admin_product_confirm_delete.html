{% extends 'store/base.html' %}
{% block title %}Eliminar Producto — FrutaVerde Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-danger border-0">
            <div class="card-header bg-danger text-white fw-bold">
                <i class="bi bi-exclamation-triangle"></i> Confirmar eliminación
            </div>
            <div class="card-body text-center py-4">
                <i class="bi bi-trash3-fill text-danger" style="font-size:3rem;"></i>
                <h5 class="mt-3">¿Eliminar <strong>{{ product.name }}</strong>?</h5>
                <p class="text-muted">Esta acción no se puede deshacer.</p>

                <div class="d-flex gap-3 justify-content-center mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="bi bi-trash3"></i> Sí, eliminar
                        </button>
                    </form>
                    <a href="{% url 'admin_products' %}" class="btn btn-outline-secondary px-4">
                        Cancelar
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
